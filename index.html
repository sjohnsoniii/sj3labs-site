<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SJ3 Labs</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      text-align: center;
    }
    header {
      padding: 60px 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      transition: 0.2s;
    }
    .card:hover {
      background: #1a1a1a;
      transform: translateY(-5px);
    }
  </style>
</head>
<body>

<header>
  <h1>SJ3 Labs</h1>
  <p>Experiments. Tools. Digital chaos.</p>
</header>

<section class="grid">
  <div class="card">
    <h2>🍗 Wingmasters Chronicles</h2>
    <p>Reviewing wings across the map.</p>
  </div>

  <div class="card">
    <h2>🏙 The Streets</h2>
    <p>Geo-based stories and nightlife intel.</p>
  </div>

  <div class="card">
    <h2>🤖 AI Lab</h2>
    <p>Bots, automation, and experiments.</p>
  </div>

  <div class="card">
    <h2>🧪 Tools</h2>
    <p>Random utilities and projects.</p>
  </div>
</section>

</body>
</html>
